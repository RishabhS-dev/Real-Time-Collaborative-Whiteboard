# ============================================
# APPLICATION CONFIGURATION
# ============================================
spring.application.name=collaborative-whiteboard
server.port=${PORT:8080}

# ============================================
# DATABASE CONFIGURATION
# Switch between MySQL and H2 by commenting/uncommenting
# ============================================

# ========== OPTION 1: MYSQL (PRODUCTION) ==========
# Uncomment these 4 lines for MySQL
#spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/whiteboard_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
#spring.datasource.username=${DB_USERNAME:root}
#spring.datasource.password=${DB_PASSWORD:root}
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ========== OPTION 2: H2 (DEVELOPMENT/TESTING) ==========
# Uncomment these 4 lines for H2 (comment out MySQL above)
# No installation needed! Data stored in file.
spring.datasource.url=jdbc:h2:file:./data/whiteboard
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 Console (only for H2 database)
# Access at: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================
# JPA CONFIGURATION (WORKS FOR BOTH)
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production-must-be-at-least-256-bits-long}
jwt.expiration=86400000

# ============================================
# CORS CONFIGURATION
# ============================================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# ============================================
# WEBSOCKET CONFIGURATION
# ============================================
spring.websocket.allowed-origins=${WS_ORIGINS:http://localhost:3000,http://localhost:5173}

# ============================================
# LOGGING
# ============================================
logging.level.root=INFO
logging.level.com.whiteboard=DEBUG

# ============================================
# ERROR HANDLING
# ============================================
server.error.include-message=always
server.error.include-binding-errors=always

# ============================================
# INSTRUCTIONS:
# ============================================
# To switch database:
# 1. MySQL: Uncomment MySQL section, comment H2 section
# 2. H2: Uncomment H2 section, comment MySQL section
# 3. Restart application
# 
# MySQL: Best for production, requires installation
# H2: Best for testing, no installation needed, data in ./data/whiteboard.mv.db
